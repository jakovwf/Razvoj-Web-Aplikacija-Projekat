@if (showNavbar()) {
  <div class="min-h-screen bg-base-200">
    <div class="flex min-h-screen">
      <app-navbar [isSidebarOpen]="isSidebarOpen()" (sidebarToggle)="toggleSidebar()" />

      <main class="min-w-0 flex-1 p-4 pt-20 transition-all duration-300">
        <router-outlet />
      </main>
    </div>
  </div>
} @else {
  <main class="min-h-screen bg-base-200">
    <router-outlet />
  </main>
}

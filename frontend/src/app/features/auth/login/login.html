<main class="flex min-h-screen items-center justify-center bg-base-200 px-4 py-10">
  <section class="w-full max-w-md rounded-lg bg-base-100 p-6 shadow-xl">
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-semibold">Prijava</h1>
      <p class="mt-2 text-sm text-base-content/70">Nastavi ka svojim workspaceovima i boardovima.</p>
    </div>

    <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <label class="form-control">
        <span class="label-text mb-2">Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          class="input input-bordered w-full"
          placeholder="ime@example.com"
        />
      </label>

      <label class="form-control">
        <span class="label-text mb-2">Lozinka</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          class="input input-bordered w-full"
          placeholder="Unesi lozinku"
        />
      </label>

      @if (error$ | async; as error) {
        <div class="alert alert-error text-sm">{{ error }}</div>
      }

      <button type="submit" class="btn btn-primary w-full" [disabled]="form.invalid || (loading$ | async)">
        @if (loading$ | async) {
          <span class="loading loading-spinner loading-sm"></span>
        }
        Prijavi se
      </button>
    </form>

    <p class="mt-6 text-center text-sm">
      Nemaš nalog?
      <a routerLink="/register" class="link link-primary font-medium">Registruj se</a>
    </p>
  </section>
</main>

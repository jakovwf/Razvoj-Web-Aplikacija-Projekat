<main class="flex min-h-screen items-center justify-center px-4 py-10">
  <section class="app-card w-full max-w-md p-6">
    <div class="mb-6 text-center">
      <h1 class="text-2xl font-semibold">Registracija</h1>
      <p class="app-muted mt-2 text-sm">Kreiraj nalog i odmah nastavi u aplikaciju.</p>
    </div>

    <form class="space-y-4" [formGroup]="form" (ngSubmit)="submit()">
      <label class="block">
        <span class="app-label">Ime za prikaz</span>
        <input
          type="text"
          formControlName="displayName"
          autocomplete="name"
          class="app-input"
          placeholder="Tvoje ime"
        />
      </label>

      <label class="block">
        <span class="app-label">Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          class="app-input"
          placeholder="ime@example.com"
        />
      </label>

      <label class="block">
        <span class="app-label">Lozinka</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="new-password"
          class="app-input"
          placeholder="Najmanje 6 karaktera"
        />
      </label>

      @if (error$ | async; as error) {
        <div class="app-error text-sm">{{ error }}</div>
      }

      <button
        type="submit"
        class="app-button app-button-primary w-full"
        [disabled]="form.invalid || (loading$ | async)"
      >
        @if (loading$ | async) {
          <span class="loading loading-spinner loading-sm"></span>
        }
        Registruj se
      </button>
    </form>

    <p class="app-muted mt-6 text-center text-sm">
      Vec imas nalog?
      <a routerLink="/login" class="font-medium">Prijavi se</a>
    </p>
  </section>
</main>
